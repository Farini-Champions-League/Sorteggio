<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCL Draw - Creazione Squadre Farini</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; background-color: #000; color: white; }
        .ucl-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('sfondo.png') center/cover no-repeat; z-index: 1; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 20, 0.85); z-index: 2; }
        #click-master { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; flex-direction: column; }
        
        #match-card { display: none; width: 90%; max-width: 900px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 20px; border: 2px solid #0047e1; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; box-shadow: 0 0 60px rgba(0,71,225,0.4); }
        #final-ui { display: none; animation: pop 0.6s ease-out; }
        .trophy-img { width: 300px; height: auto; filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.6)); margin-bottom: 20px; }
        
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        /* Intestazione Squadra (senza logo) */
        .team-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 20px; }
        .team-name { font-size: 38px; font-weight: 900; text-transform: uppercase; color: #fff; letter-spacing: 4px; text-shadow: 0 0 15px rgba(212,175,55,0.6); }
        
        /* Layout Giocatori */
        .players-container { display: flex; justify-content: space-around; width: 100%; gap: 20px; }
        .player-box { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px 10px; display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden; }
        
        .role-badge { position: absolute; top: 0; left: 0; width: 100%; padding: 5px 0; font-size: 12px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        .role-def { background: #0047e1; color: white; }
        .role-att { background: #cc0000; color: white; }
        
        .player-name { font-size: 28px; font-weight: 900; text-transform: uppercase; margin-top: 20px; min-height: 40px; color: #d4af37; text-shadow: 0 0 10px rgba(212,175,55,0.5); transition: color 0.3s; text-align: center; }
        .player-name.shuffling { color: #fff; text-shadow: none; filter: blur(1px); }

        .draw-status { margin-top: 25px; font-size: 14px; letter-spacing: 3px; color: #00ffa3; font-weight: bold; text-transform: uppercase; opacity: 0; transition: opacity 0.5s; }
        
        .ball { width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, #fff, #999); border-radius: 50%; animation: bounce 0.6s infinite alternate ease-in-out; border: 2px solid #fff; margin: 10px; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }
    </style>
</head>
<body>

<div class="ucl-bg"></div>
<div class="overlay"></div>

<div id="click-master" onclick="handleInteraction()">
    <div id="intro-ui">
        <h1 style="font-size: 50px; margin: 0; text-shadow: 0 0 20px rgba(0,71,225,0.8);">OFFICIAL DRAW</h1>
        <h2 style="color: #d4af37; letter-spacing: 5px; margin-top: 10px;">FARINI CHAMPIONS LEAGUE</h2>
        <h3 style="font-weight: 400; opacity: 0.8;">Composizione Nuove Squadre</h3>
        <div style="display: flex; justify-content: center; margin: 40px 0;">
            <div class="ball"></div><div class="ball" style="animation-delay: 0.2s"></div>
        </div>
        <p id="loading-text" style="text-transform: uppercase; letter-spacing: 2px; color: #d4af37;">⏳ Sincronizzazione giocatori in corso...</p>
    </div>

    <div id="match-card">
        <div class="team-header">
            <div style="color: #00aaff; font-size: 14px; letter-spacing: 4px; margin-bottom: 5px;" id="draw-number">ESTRAZIONE</div>
            <div class="team-name" id="t-name">SQUADRA 1</div>
        </div>
        
        <div class="players-container">
            <div class="player-box">
                <div class="role-badge role-def">DIFENSORE</div>
                <div class="player-name" id="p-def">---</div>
            </div>
            <div class="player-box">
                <div class="role-badge role-att">ATTACCANTE</div>
                <div class="player-name" id="p-att">---</div>
            </div>
        </div>
        
        <div id="status" class="draw-status">COPPIA FORMATA!</div>
    </div>

    <div id="final-ui">
        <img src="coppa.png" class="trophy-img" alt="Trofeo" onerror="this.style.display='none'">
        <h1 style="font-size: 40px; color: #d4af37; text-shadow: 0 0 20px rgba(212,175,55,0.5);">TUTTE LE SQUADRE SONO FORMATE!</h1>
        <div id="panchina-info" style="color: #cc0000; font-size: 22px; margin-top: 15px; font-weight: bold;"></div>
        <p style="opacity: 0.8; font-size: 20px; margin-top: 10px;">Che il torneo abbia inizio.</p>
        <p style="opacity: 0.5; margin-top: 40px; font-size: 12px; letter-spacing: 2px;">Ricarica la pagina per effettuare un nuovo sorteggio</p>
    </div>
</div>

<audio id="anthem" src="inno.mp3" loop></audio>

<script>
    const anthem = document.getElementById('anthem');
    let currentIdx = 0;
    let isDrawing = false; 
    let isDataLoaded = false;
    
    // Dati che verranno popolati dal Google Sheet
    let drawSequence = [];
    let dummyNames = [];
    let panchinari = [];
    
    // ID del tuo Google Sheet e URL per il download CSV
    const sheetId = '1gBWNDiPfcUz5-9kwn5xFBhJbSZaMJXfniGq1lCaWjns';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=0`;

    // Funzione che scarica i dati all'apertura della pagina
    async function loadPlayers() {
        try {
            const response = await fetch(csvUrl);
            const csvText = await response.text();
            
            // Processa il CSV
            const rows = csvText.split('\n').map(row => row.trim()).filter(row => row.length > 0);
            const giocatori = [];
            
            // i=1 per saltare la prima riga di intestazione (Nome, Cognome, Ruolo)
            for(let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(','); // Usa la virgola come separatore standard
                if(cols.length >= 3) {
                    giocatori.push({
                        nome: cols[0].trim(),
                        cognome: cols[1].trim(),
                        ruolo: cols[2].trim()
                    });
                }
            }

            dummyNames = giocatori.map(g => g.nome + " " + g.cognome.charAt(0) + ".");
            organizeTeams(giocatori);
            
            // Abilita l'interazione
            isDataLoaded = true;
            const loadingText = document.getElementById('loading-text');
            loadingText.innerText = "Tocca per estrarre la prima squadra";
            loadingText.style.color = "#ffffff";
            loadingText.style.animation = "flash 1.5s infinite";

        } catch (error) {
            document.getElementById('loading-text').innerText = "⚠️ ERRORE: Impossibile leggere il Google Sheet. Controlla le autorizzazioni.";
            document.getElementById('loading-text').style.color = "#cc0000";
        }
    }

    function organizeTeams(giocatori) {
        let attaccanti = [];
        let difensori = [];
        let jolly = [];

        giocatori.forEach(g => {
            if (g.ruolo.toLowerCase() === "attaccante") attaccanti.push(g);
            else if (g.ruolo.toLowerCase() === "difensore") difensori.push(g);
            else if (g.ruolo.toLowerCase() === "jolly") jolly.push(g);
        });

        // Logica di bilanciamento Jolly
        jolly.forEach(j => {
            if (attaccanti.length < difensori.length) {
                attaccanti.push(j);
            } else if (difensori.length < attaccanti.length) {
                difensori.push(j);
            } else {
                Math.random() > 0.5 ? attaccanti.push(j) : difensori.push(j);
            }
        });

        // Mischiamo casualmente i giocatori all'interno dei loro ruoli
        attaccanti.sort(() => Math.random() - 0.5);
        difensori.sort(() => Math.random() - 0.5);

        const maxSquadre = Math.min(attaccanti.length, difensori.length);

        for (let i = 0; i < maxSquadre; i++) {
            drawSequence.push({
                teamName: `SQUADRA ${i + 1}`,
                defName: difensori[i].nome + " " + difensori[i].cognome.charAt(0) + ".",
                attName: attaccanti[i].nome + " " + attaccanti[i].cognome.charAt(0) + "."
            });
        }

        // Troviamo chi avanza
        if (attaccanti.length > maxSquadre) {
            for(let i = maxSquadre; i < attaccanti.length; i++) {
                panchinari.push(attaccanti[i].nome + " " + attaccanti[i].cognome);
            }
        }
        if (difensori.length > maxSquadre) {
            for(let i = maxSquadre; i < difensori.length; i++) {
                panchinari.push(difensori[i].nome + " " + difensori[i].cognome);
            }
        }
    }

    // Carica i dati appena la pagina è pronta
    window.onload = loadPlayers;

    function handleInteraction() {
        if (!isDataLoaded || isDrawing) return;

        if (anthem.paused) anthem.play().catch(e => console.log("Audio bloccato dal browser senza interazione"));

        const intro = document.getElementById('intro-ui');
        const card = document.getElementById('match-card');
        const final = document.getElementById('final-ui');

        if (currentIdx < drawSequence.length) {
            isDrawing = true;
            intro.style.display = 'none';
            card.style.display = 'block';
            document.getElementById('status').style.opacity = '0';
            
            const data = drawSequence[currentIdx];
            
            document.getElementById('draw-number').innerText = `ESTRAZIONE ${currentIdx + 1} DI ${drawSequence.length}`;
            document.getElementById('t-name').innerText = data.teamName;

            const defEl = document.getElementById('p-def');
            const attEl = document.getElementById('p-att');
            
            defEl.classList.add('shuffling');
            attEl.classList.add('shuffling');

            let shuffleInterval = setInterval(() => {
                defEl.innerText = dummyNames[Math.floor(Math.random() * dummyNames.length)];
                attEl.innerText = dummyNames[Math.floor(Math.random() * dummyNames.length)];
            }, 60);

            setTimeout(() => {
                clearInterval(shuffleInterval);
                
                defEl.classList.remove('shuffling');
                attEl.classList.remove('shuffling');
                
                defEl.innerText = data.defName;
                attEl.innerText = data.attName;
                
                document.getElementById('status').style.opacity = '1';
                
                currentIdx++;
                isDrawing = false; 
            }, 2000); 

        } else {
            card.style.display = 'none';
            final.style.display = 'block';
            if (panchinari.length > 0) {
                document.getElementById('panchina-info').innerText = `Giocatori a riposo per questo turno: ${panchinari.join(", ")}`;
            }
        }
    }
</script>
</body>
</html>
