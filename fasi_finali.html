<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fasi Finali - Torneo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background: #000; color: white; overflow-x: hidden; transition: 1s; }
        .ucl-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('sfondo.png') center/cover no-repeat; z-index: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 20, 0.85); z-index: 2; }
        
        .main-wrapper { position: relative; z-index: 10; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-title { color: #d4af37; text-transform: uppercase; font-size: 36px; margin: 20px 0 60px 0; text-shadow: 0 0 20px rgba(212,175,55,0.6); letter-spacing: 3px; font-weight: 900; transition: 1s; }

        /* STRUTTURA GRID BLINDATA */
        .tournament-container { 
            display: grid !important; 
            grid-template-columns: 380px 1fr 380px !important; 
            grid-template-areas: "col-A col-center col-B" !important;
            gap: 20px; width: 98%; max-width: 1600px; align-items: start; transition: 1s;
        }

        .box-A { grid-area: col-A; }
        .bracket-area { grid-area: col-center; display: flex; flex-direction: column; align-items: center; gap: 40px; min-width: 0; }
        .box-B { grid-area: col-B; }

        /* GIRONI */
        .group-box { width: 100%; border: 2px solid #d4af37; border-radius: 12px; background: rgba(0,0,0,0.7); overflow: hidden; transition: 1s; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        td { padding: 12px 5px; text-align: center; border-bottom: 1px solid #222; font-weight: 700; }
        .mini-logo { width: 24px; height: 24px; vertical-align: middle; margin-right: 8px; border-radius: 50%; background: white; object-fit: contain; }

        /* TABELLONE */
        .match-box { width: 220px; background: rgba(0,10,30,0.9); border: 2px dashed #00aaff; border-radius: 10px; padding: 15px; transition: 1s; }
        .final-box { width: 320px; border: 3px solid #d4af37; background: rgba(212,175,55,0.1); border-radius: 15px; padding: 20px; transition: 1s; }

        /* BOX VINCITORE (BASE) */
        .winner-card { 
            width: 400px; background: linear-gradient(145deg, rgba(212,175,55,0.25), rgba(0,0,0,0.9)); 
            border: 4px double #d4af37; border-radius: 20px; padding: 30px; text-align: center;
            box-shadow: 0 0 60px rgba(212,175,55,0.5);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; z-index: 1000;
        }

        /* EFFETTO CELEBRAZIONE (ZOOM) */
        .winner-card.celebrate {
            transform: scale(1.35);
            background: linear-gradient(145deg, rgba(212,175,55,0.7), rgba(0,0,0,0.95));
            box-shadow: 0 0 100px rgba(212,175,55,1), 0 0 200px rgba(212,175,55,0.4);
        }

        .party-mode .header-title, 
        .party-mode .group-box, 
        .party-mode .match-box, 
        .party-mode .final-box {
            filter: blur(5px) grayscale(0.8);
            opacity: 0.2;
        }

        .winner-logo-big { width: 80px; height: 80px; background: white; border-radius: 50%; border: 3px solid #d4af37; object-fit: contain; margin-bottom: 15px; transition: 1s; }
        .celebrate .winner-logo-big { transform: scale(1.2) rotate(5deg); box-shadow: 0 0 30px #fff; }

        .winner-name { font-size: 28px; color: #fff; font-weight: 900; text-transform: uppercase; }
        .trophy-large { width: 130px; filter: drop-shadow(0 0 25px gold); animation: pulse 2s infinite; }

        .btn-celebra { margin-top:20px; background:#d4af37; border:none; padding:12px 25px; border-radius:50px; font-weight:900; cursor:pointer; font-family:'Montserrat'; text-transform:uppercase; box-shadow: 0 0 15px rgba(212,175,55,0.4); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        .score-box { background: #d4af37; color: #000; min-width: 25px; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .nav-link { position: fixed; top: 20px; left: 20px; z-index: 100; background: #d4af37; color: black; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="ucl-bg"></div>
<div class="overlay"></div>

<a href="classifica.html" class="nav-link">← TORNA ALLA CLASSIFICA</a>

<div class="main-wrapper">
    <div class="header-title">FASI FINALI</div>

    <div class="tournament-container">
        <div class="group-box box-A">
            <div style="background:rgba(212,175,55,0.15); padding:15px; text-align:center; color:#d4af37; font-weight:900; border-bottom:2px solid #d4af37;">GIRONE A</div>
            <table><tbody id="body-A"></tbody></table>
        </div>

        <div class="bracket-area">
            <div class="semis-row">
                <div class="match-box">
                    <div style="font-size:10px; color:#00aaff; text-align:center; font-weight:900;">SEMIFINALE 1</div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px;"><span>1A</span><span class="score-box">-</span></div>
                    <div style="display:flex; justify-content:space-between; margin-top:5px;"><span>2B</span><span class="score-box">-</span></div>
                </div>
                <div class="match-box">
                    <div style="font-size:10px; color:#00aaff; text-align:center; font-weight:900;">SEMIFINALE 2</div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px;"><span>1B</span><span class="score-box">-</span></div>
                    <div style="display:flex; justify-content:space-between; margin-top:5px;"><span>2A</span><span class="score-box">-</span></div>
                </div>
            </div>

            <div class="final-box">
                <div style="color:#d4af37; font-weight:900; text-align:center; margin-bottom:10px;">FINALISSIMA</div>
                <div style="display:flex; justify-content:space-between; font-size:18px;"><span>TEAM 1</span><span class="score-box">-</span></div>
                <div style="display:flex; justify-content:space-between; font-size:18px; margin-top:5px;"><span>TEAM 2</span><span class="score-box">-</span></div>
            </div>

            <div class="winner-section">
                <img src="coppa.png" class="trophy-large">
                <div class="winner-card" id="card-campione">
                    <div class="champion-label">CAMPIONE FARINI CL</div>
                    <img src="placeholder-logo.png" class="winner-logo-big">
                    <div class="winner-name">NOME TEAM VINCITORE</div>
                    <button class="btn-celebra" onclick="celebrazione()">🏆 Celebra la Vittoria!</button>
                </div>
            </div>
        </div>

        <div class="group-box box-B">
            <div style="background:rgba(212,175,55,0.15); padding:15px; text-align:center; color:#d4af37; font-weight:900; border-bottom:2px solid #d4af37;">GIRONE B</div>
            <table><tbody id="body-B"></tbody></table>
        </div>
    </div>
</div>

<audio id="anthem" src="inno.mp3" preload="auto" loop></audio>

<script>
function celebrazione() {
    const audio = document.getElementById('anthem');
    const card = document.getElementById('card-campione');
    const body = document.body;

    // ATTIVAZIONE EFFETTI VISIVI
    card.classList.add('celebrate');
    body.classList.add('party-mode');

    // ATTIVAZIONE AUDIO
    audio.play().catch(e => console.log("Errore audio:", e));

    // CORIANDOLI
    var duration = 15 * 1000;
    var animationEnd = Date.now() + duration;
    var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 2000 };

    function randomInRange(min, max) { return Math.random() * (max - min) + min; }

    var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);
        var particleCount = 50 * (timeLeft / duration);
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }, colors: ['#d4af37', '#ffffff'] }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }, colors: ['#d4af37', '#ffffff'] }));
    }, 250);
}

// LOGICA DATI FOGLIO
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTRHxOqEYcRx0m4UxNzXDm1UrmEJtue7wyBFR7IC4iEIH_2WqrITNuaPA8BJIzWSzN7XcZsspJZOFX3/pub?gid=0&single=true&output=csv';
const TEAM_DATA = { "Aston Pinna": { logo: "Aston.png", grp: "A" }, "I Milanisti": { logo: "Milanisti.png", grp: "A" }, "Berlusca Dortmund": { logo: "Dortmund.png", grp: "A" }, "B.I.B.C.": { logo: "bibc.png", grp: "A" }, "Farini Fighter": { logo: "Farini.png", grp: "A" }, "Armistizio FC": { logo: "Armistizio.png", grp: "B" }, "PennyChellas": { logo: "Penny.png", grp: "B" }, "Attenti a Quei Due": { logo: "Attenti.jpg", grp: "B" }, "Calcio Barilla": { logo: "Barilla.jpg", grp: "B" }, "FC Pelados": { logo: "Pelados.png", grp: "B" } };

async function init() {
    try {
        const res = await fetch(SHEET_URL + '&t=' + new Date().getTime());
        const csv = await res.text();
        const rows = csv.split('\n').slice(1);
        let stats = {};
        Object.keys(TEAM_DATA).forEach(name => { stats[name] = { name: name, pts: 0, p: 0, gf: 0, gs: 0, grp: TEAM_DATA[name].grp }; });
        rows.forEach(row => {
            const c = row.split(',');
            if (c.length < 5) return;
            const t1 = c[1]?.trim(); const t2 = c[2]?.trim();
            const g1 = parseInt(c[3]); const g2 = parseInt(c[4]);
            if (!isNaN(g1) && !isNaN(g2)) {
                stats[t1].p++; stats[t1].gf += g1; stats[t1].gs += g2;
                stats[t2].p++; stats[t2].gf += g2; stats[t2].gs += g1;
                if (g1 > g2) stats[t1].pts += 3; else if (g1 < g2) stats[t2].pts += 3; else { stats[t1].pts++; stats[t2].pts++; }
            }
        });
        ['A', 'B'].forEach(g => {
            const sorted = Object.values(stats).filter(x => x.grp === g).sort((a,b) => b.pts - a.pts || (b.gf-b.gs) - (a.gf-a.gs));
            document.getElementById(`body-${g}`).innerHTML = sorted.map(t => `<tr><td style="text-align:left; padding-left:15px;"><img src="${TEAM_DATA[t.name].logo}" style="width:20px; vertical-align:middle; margin-right:8px;">${t.name}</td><td>${t.pts}</td><td>${t.p}</td><td>${t.gf}</td><td>${t.gs}</td><td>${t.gf-t.gs}</td></tr>`).join('');
        });
    } catch (e) { console.error(e); }
}
init();
</script>
</body>
</html>
