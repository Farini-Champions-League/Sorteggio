<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fasi Finali - Torneo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://www.psdmockups.com/wp-content/uploads/2017/07/UEFA-Champions-League-Background-Morphed.jpg');
            background-size: cover; background-attachment: fixed; color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .nav-link { position: fixed; top: 20px; left: 20px; background: #d4af37; color: black; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 12px; z-index: 100; box-shadow: 0 0 15px rgba(212,175,55,0.5); }

        h1 { font-family: 'Orbitron', sans-serif; color: #d4af37; margin: 40px 0; letter-spacing: 5px; text-shadow: 0 0 20px rgba(212,175,55,0.5); }

        /* GRIGLIA PRINCIPALE */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 40px; width: 95%; max-width: 1400px;
            align-items: center; margin-top: 20px;
        }

        .column { display: flex; flex-direction: column; gap: 30px; align-items: center; }

        /* BOX PARTITA */
        .match-card {
            background: rgba(0,0,0,0.6); border-radius: 15px; padding: 20px;
            width: 100%; box-sizing: border-box; text-align: center;
            transition: transform 0.3s ease;
        }

        .semi { border: 2px dashed #00aaff; box-shadow: 0 0 15px rgba(0,170,255,0.1); }
        .final { border: 3px solid #d4af37; box-shadow: 0 0 30px rgba(212,175,55,0.2); transform: scale(1.05); }

        .label { font-family: 'Orbitron', sans-serif; font-size: 12px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .semi .label { color: #00aaff; }
        .final .label { color: #d4af37; font-size: 16px; }

        .team-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; background: rgba(255,255,255,0.05);
            margin: 8px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
        }

        .team-box { display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 700; }
        .logo { width: 35px; height: 35px; object-fit: contain; }
        
        .score-input {
            width: 40px; background: #111; border: 1px solid #444;
            color: #d4af37; text-align: center; font-family: 'Orbitron', sans-serif;
            font-size: 18px; padding: 5px; border-radius: 5px;
        }

        .vs { color: #555; font-style: italic; margin: 5px 0; font-size: 14px; }
        .trophy { width: 120px; margin-bottom: 10px; filter: drop-shadow(0 0 15px gold); }

        /* REGOLE MOBILE */
        @media (max-width: 1000px) {
            .main-container { grid-template-columns: 1fr; }
            .final { order: -1; margin-bottom: 40px; }
        }
    </style>
</head>
<body>

    <a href="classifica.html" class="nav-link">⬅ TORNA ALLA CLASSIFICA</a>

    <h1>FASI FINALI</h1>

    <div class="main-container">
        
        <div class="column">
            <div class="match-card semi">
                <div class="label">Semifinale 1</div>
                <div class="team-row">
                    <div class="team-box"><img src="logo_milan.png" class="logo"><span>MILAN</span></div>
                    <input type="text" class="score-input" placeholder="-">
                </div>
                <div class="vs">vs</div>
                <div class="match-row team-row">
                    <div class="team-box"><img src="logo_roma.png" class="logo"><span>ROMA</span></div>
                    <input type="text" class="score-input" placeholder="-">
                </div>
            </div>
        </div>

        <div class="column">
            <img src="https://pngimg.com/uploads/champions_league/champions_league_PNG22.png" class="trophy">
            <div class="match-card final">
                <div class="label">Finalissima</div>
                <div class="team-row">
                    <div class="team-box"><img src="logo_milan.png" class="logo"><span>MILAN</span></div>
                    <input type="text" class="score-input" placeholder="-">
                </div>
                <div class="vs">vs</div>
                <div class="team-row">
                    <div class="team-box"><img src="logo_napoli.png" class="logo"><span>NAPOLI</span></div>
                    <input type="text" class="score-input" placeholder="-">
                </div>
            </div>
        </div>

        <div class="column">
            <div class="match-card semi">
                <div class="label">Semifinale 2</div>
                <div class="team-row">
                    <div class="team-box"><img src="logo_napoli.png" class="logo"><span>NAPOLI</span></div>
                    <input type="text" class="score-input" placeholder="-">
                </div>
                <div class="vs">vs</div>
                <div class="match-row team-row">
                    <div class="team-box"><img src="logo_inter.png" class="logo"><span>INTER</span></div>
                    <input type="text" class="score-input" placeholder="-">
                </div>
            </div>
        </div>

    </div>

</body>
</html>
