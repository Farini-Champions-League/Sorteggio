<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>UCL Draw - Calcio Balilla</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; background-color: #000b2a; color: white; }
        .ucl-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #001a4d 0%, #000514 100%); z-index: 1; }
        #click-master { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; }
        .urn { display: flex; justify-content: center; gap: 30px; margin: 40px 0; }
        .ball { width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #fff, #999); border-radius: 50%; animation: bounce 0.6s infinite alternate ease-in-out; border: 2px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-30px); } }
        #match-card { display: none; width: 90%; max-width: 900px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 2px solid #0047e1; animation: pop 0.4s ease-out; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .team-box { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .team-logo { width: 160px; height: 160px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; border: 4px solid #d4af37; overflow: hidden; margin-bottom: 15px; }
        .team-logo img { width: 100%; height: 100%; object-fit: contain; }
        .team-name { font-size: 26px; font-weight: 900; text-transform: uppercase; min-height: 60px; display: flex; align-items: center; }
        .vs { font-size: 35px; color: #d4af37; font-weight: 900; margin: 0 20px; }
        .extra { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; font-size: 18px; }
        .rest { color: #00ffa3; font-weight: bold; font-size: 22px; margin-top: 10px; }
    </style>
</head>
<body onclick="nextStep()">

<audio id="anthem" src="inno.mp3" loop></audio>

<div class="ucl-bg"></div>

<div id="click-master">
    <div id="intro-ui">
        <h1 style="font-size: 60px; margin-bottom: 0;">OFFICIAL DRAW</h1>
        <h2 style="color: #d4af37; letter-spacing: 10px;">CHAMPIONS LEAGUE</h2>
        <div class="urn">
            <div class="ball"></div><div class="ball" style="animation-delay: 0.2s"></div><div class="ball" style="animation-delay: 0.4s"></div>
        </div>
        <p style="letter-spacing: 3px; opacity: 0.7;">CLICCA PER INIZIARE IL SORTEGGIO</p>
    </div>

    <div id="match-card">
        <h3 id="turn-title" style="color: #00aaff; margin-bottom: 30px; font-size: 24px;"></h3>
        <div style="display: flex; align-items: center; justify-content: space-around;">
            <div class="team-box">
                <div class="team-logo"><img id="l1" src=""></div>
                <div class="team-name" id="t1"></div>
            </div>
            <div class="vs">VS</div>
            <div class="team-box">
                <div class="team-logo"><img id="l2" src=""></div>
                <div class="team-name" id="t2"></div>
            </div>
        </div>
        <div class="extra">
            <div>Match 2: <span id="m2" style="font-weight: bold; color: #fff;"></span></div>
            <div id="rest" class="rest"></div>
        </div>
    </div>
</div>

<script>
    let step = 0;
    
    // Mappatura file (Assicurati che i nomi dei file caricati su GitHub siano identici)
    const files = {
        milanisti: "image_e2c98c.png",
        aston: "image_ed49f3.png",
        dortmund: "image_ed49f8.png",
        bibc: "image_ed4ca3.jpg",
        farini: "image_ed4c9d.jpg",
        attenti: "image_ed4cc3.jpg",
        pelados: "image_ed4cbd.png",
        armistizio: "image_ed4cdf.jpg",
        barilla: "image_ed4cf9.jpg",
        penny: "image_ed4cfe.png"
    };

    const draw = [
        { turn: "GRUPPO 1 - TURNO 1", t1: "I MILANISTI", l1: files.milanisti, t2: "ASTON PINNA", l2: files.aston, m2: "Farini Fighter vs B.I.B.C.", rest: "Riposa: Berlusca Dortmund" },
        { turn: "GRUPPO 1 - TURNO 2", t1: "BERLUSCA DORTMUND", l1: files.dortmund, t2: "I MILANISTI", l2: files.milanisti, m2: "Aston Pinna vs Farini Fighter", rest: "Riposa: B.I.B.C." },
        { turn: "GRUPPO 1 - TURNO 3", t1: "B.I.B.C.", l1: files.bibc, t2: "BERLUSCA DORTMUND", l2: files.dortmund, m2: "I Milanisti vs Farini Fighter", rest: "Riposa: Aston Pinna" },
        { turn: "GRUPPO 1 - TURNO 4", t1: "ASTON PINNA", l1: files.aston, t2: "B.I.B.C.", l2: files.bibc, m2: "Farini Fighter vs Berlusca Dortmund", rest: "Riposa: I Milanisti" },
        { turn: "GRUPPO 1 - TURNO 5", t1: "BERLUSCA DORTMUND", l1: files.dortmund, t2: "B.I.B.C.", l2: files.bibc, m2: "I Milanisti vs Aston Pinna", rest: "Riposa: Farini Fighter" },
        { turn: "GRUPPO 2 - TURNO 1", t1: "ATTENTI A QUEI DUE", l1: files.attenti, t2: "FC PELADOS", l2: files.pelados, m2: "Armistizio FC vs Calcio Barilla", rest: "Riposa: Penny Chellas" },
        { turn: "GRUPPO 2 - TURNO 2", t1: "PENNY CHELLAS", l1: files.penny, t2: "ATTENTI A QUEI DUE", l2: files.attenti, m2: "FC Pelados vs Armistizio FC", rest: "Riposa: Calcio Barilla" },
        { turn: "GRUPPO 2 - TURNO 3", t1: "CALCIO BARILLA", l1: files.barilla, t2: "PENNY CHELLAS", l2: files.penny, m2: "Attenti a quei due vs Armistizio FC", rest: "Riposa: FC Pelados" },
        { turn: "GRUPPO 2 - TURNO 4", t1: "FC PELADOS", l1: files.pelados, t2: "CALCIO BARILLA", l2: files.barilla, m2: "Armistizio FC vs Penny Chellas", rest: "Riposa: Attenti a quei due" },
        { turn: "GRUPPO 2 - TURNO 5", t1: "PENNY CHELLAS", l1: files.penny, t2: "FC PELADOS", l2: files.pelados, m2: "Calcio Barilla vs Attenti a quei due", rest: "Riposa: Armistizio FC" }
    ];

    function nextStep() {
        const audio = document.getElementById('anthem');
        if (audio.paused) audio.play().catch(e => console.log("Audio bloccato"));

        if (step < draw.length) {
            document.getElementById('intro-ui').style.display = 'none';
            document.getElementById('match-card').style.display = 'block';
            const d = draw[step];
            document.getElementById('turn-title').innerText = d.turn;
            document.getElementById('t1').innerText = d.t1;
            document.getElementById('l1').src = d.l1;
            document.getElementById('t2').innerText = d.t2;
            document.getElementById('l2').src = d.l2;
            document.getElementById('m2').innerText = d.m2;
            document.getElementById('rest').innerText = d.rest;
            step++;
        } else {
            location.reload();
        }
    }
</script>
</body>
</html>
