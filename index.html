<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteggio UCL</title>
    <style>
        body { background-color: #000b2a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; border: 2px solid #0047e1; display: inline-block; }
        img { width: 150px; height: 150px; border-radius: 50%; background: white; object-fit: contain; margin: 10px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #d4af37; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>CHAMPIONS LEAGUE DRAW</h1>
    <div id="setup">
        <button onclick="start()">INIZIA SORTEGGIO</button>
    </div>
    <div id="match" style="display:none;">
        <div class="card">
            <h2 id="title"></h2>
            <img id="l1" src=""><br>
            <span id="t1" style="font-size:24px; font-weight:bold;"></span>
            <div style="font-size:30px; color:#d4af37; margin:10px;">VS</div>
            <img id="l2" src=""><br>
            <span id="t2" style="font-size:24px; font-weight:bold;"></span>
        </div>
    </div>
    <audio id="audio" src="inno.mp3"></audio>

    <script>
        let step = 0;
        const draw = [
            { turn: "GRUPPO 1 - TURNO 1", t1: "I MILANISTI", l1: "Milanisti.png", t2: "ASTON PINNA", l2: "Aston.png" },
            { turn: "GRUPPO 1 - TURNO 2", t1: "BERLUSCA DORTMUND", l1: "Dortmund.png", t2: "I MILANISTI", l2: "Milanisti.png" },
            { turn: "GRUPPO 2 - TURNO 1", t1: "ATTENTI A QUEI DUE", l1: "Attenti.jpg", t2: "FC PELADOS", l2: "Pelados.png" }
        ];

        function start() {
            document.getElementById('audio').play();
            showMatch();
        }

        function showMatch() {
            if(step < draw.length) {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('match').style.display = 'block';
                const d = draw[step];
                document.getElementById('title').innerText = d.turn;
                document.getElementById('t1').innerText = d.t1;
                document.getElementById('l1').src = d.l1;
                document.getElementById('t2').innerText = d.t2;
                document.getElementById('l2').src = d.l2;
                step++;
            } else {
                location.reload();
            }
        }
        document.body.onclick = () => { if(step > 0) showMatch(); };
    </script>
</body>
</html>
