<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tabellone - Farini CL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background: #000; color: white; scroll-behavior: smooth; }
        .ucl-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('sfondo.png') center/cover no-repeat; z-index: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 20, 0.9); z-index: 2; }
        .main-wrapper { position: relative; z-index: 10; padding: 40px 10px; display: flex; flex-direction: column; align-items: center; gap: 50px; }
        
        h1 { color: #d4af37; text-transform: uppercase; text-align: center; font-size: clamp(24px, 5vw, 40px); margin: 0; text-shadow: 0 0 20px rgba(212,175,55,0.5); }
        h2 { color: #00aaff; text-transform: uppercase; font-size: 22px; border-left: 5px solid #d4af37; padding-left: 15px; margin: 40px 0 20px 0; width: 100%; max-width: 1200px; }
        
        .loading-status { color: #d4af37; font-style: italic; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .bracket-grid { display: grid; grid-template-columns: 1fr 0.8fr 1fr; gap: 20px; width: 100%; max-width: 1500px; }
        .side-column { display: flex; flex-direction: column; gap: 25px; }
        
        .match-card { background: rgba(255,255,255,0.07); border: 1px solid #333; border-radius: 8px; overflow: hidden; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .match-header { background: #0047e1; font-size: 10px; padding: 6px 12px; font-weight: 900; display: flex; justify-content: space-between; color: white; }
        
        .team-row { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
        .team-info-wrapper { display: flex; align-items: center; gap: 12px; }
        .mini-logo { width: 30px; height: 30px; border-radius: 50%; background: white; object-fit: contain; border: 1px solid #d4af37; flex-shrink: 0; }
        .team-name { font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .score-box { background: #222; width: 35px; height: 30px; line-height: 30px; text-align: center; font-weight: 900; border-radius: 4px; border: 1px solid #555; }
        .winner-score { background: #d4af37 !important; color: #000; border-color: #d4af37; }

        .tables-container { width: 100%; max-width: 1600px; display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 30px; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 10px; overflow: hidden; }
        th { background: #111; color: #d4af37; padding: 15px; font-size: 11px; border-bottom: 2px solid #d4af37; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #222; font-size: 13px; }
        .t-left { text-align: left; padding-left: 15px; }

        .special-container { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border: 1px dashed #d4af37; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .nav-link { position: fixed; top: 20px; left: 20px; z-index: 100; background: #d4af37; color: black; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; }
        
        @media (max-width: 1200px) { .bracket-grid, .tables-container, .special-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="ucl-bg"></div>
<div class="overlay"></div>
<a href="index.html" class="nav-link">← HOME</a>

<div class="main-wrapper">
    <h1>🏆 LIVE TORNEO FARINI</h1>
    <div id="status" class="loading-status">Sincronizzazione con Google Sheets...</div>

    <div class="bracket-grid">
        <div class="side-column" id="matches-A"><h2>GIRONE A</h2></div>
        <div class="side-column" style="align-items: center; justify-content: center;">
            <img src="coppa.png" style="width:150px; filter: drop-shadow(0 0 20px #d4af37);">
            <p style="text-align:center; color:#d4af37; font-weight:900;">IN ATTESA DELLE SEMIFINALI</p>
        </div>
        <div class="side-column" id="matches-B"><h2>GIRONE B</h2></div>
    </div>

    <div class="tables-container">
        <div id="table-A-wrapper"><h2>CLASSIFICA A</h2><table id="table-A"><thead><tr><th>SQUADRA</th><th>PT</th><th>P</th><th>GF</th><th>GS</th></tr></thead><tbody id="body-A"></tbody></table></div>
        <div id="table-B-wrapper"><h2>CLASSIFICA B</h2><table id="table-B"><thead><tr><th>SQUADRA</th><th>PT</th><th>P</th><th>GF</th><th>GS</th></tr></thead><tbody id="body-B"></tbody></table></div>
        <div class="special-container">
            <div><h3 style="color:#d4af37; text-align:center;">🔥 ATTACCO</h3><table id="special-attacco"></table></div>
            <div><h3 style="color:#00aaff; text-align:center;">🛡️ DIFESA</h3><table id="special-difesa"></table></div>
        </div>
    </div>
</div>

<script>
// CONFIGURAZIONE: Inserisci qui il tuo link CSV
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTRHxOqEYcRx0m4UxNzXDm1UrmEJtue7wyBFR7IC4iEIH_2WqrITNuaPA8BJIzWSzN7XcZsspJZOFX3/pub?gid=0&single=true&output=csv';

const LOGOS = {
    "Aston Pinna": "Aston.png",
    "I Milanisti": "Milanisti.png",
    "Berlusca Dortmund": "Dortmund.png",
    "B.I.B.C.": "bibc.png",
    "Farini Fighter": "Farini.png",
    "Armistizio FC": "Armistizio.png",
    "PennyChellas": "Penny.png",
    "Attenti a Quei Due": "Attenti.jpg",
    "Calcio Barilla": "Barilla.jpg",
    "FC Pelados": "Pelados.png"
};

async function fetchData() {
    try {
        const response = await fetch(SHEET_URL);
        const data = await response.text();
        const rows = data.split('\n').slice(1); // Salta intestazione
        
        let stats = {};
        let matches = { A: [], B: [] };

        rows.forEach(row => {
            const cols = row.split(',');
            if (cols.length < 5) return;

            const grp = cols[0].trim();
            const t1 = cols[1].trim();
            const t2 = cols[2].trim();
            const g1 = parseInt(cols[3]);
            const g2 = parseInt(cols[4]);

            // Inizializza statistiche se non esistono
            [t1, t2].forEach(t => {
                if (!stats[t]) stats[t] = { name: t, pts: 0, p: 0, gf: 0, gs: 0, grp: grp };
            });

            // Calcola solo se ci sono numeri validi
            if (!isNaN(g1) && !isNaN(g2)) {
                stats[t1].p++; stats[t2].p++;
                stats[t1].gf += g1; stats[t1].gs += g2;
                stats[t2].gf += g2; stats[t2].gs += g1;
                if (g1 > g2) stats[t1].pts += 3;
                else if (g1 < g2) stats[t2].pts += 3;
                else { stats[t1].pts += 1; stats[t2].pts += 1; }
                
                matches[grp].push({t1, t2, g1, g2});
            }
        });

        renderMatches(matches);
        renderTables(stats);
        document.getElementById('status').innerHTML = "🟢 Dati aggiornati in tempo reale";

    } catch (error) {
        document.getElementById('status').innerHTML = "🔴 Errore nel caricamento dati";
        console.error(error);
    }
}

function renderMatches(matches) {
    ['A', 'B'].forEach(grp => {
        const container = document.getElementById(`matches-${grp}`);
        matches[grp].forEach((m, index) => {
            const card = document.createElement('div');
            card.className = 'match-card';
            card.style.marginBottom = "15px";
            card.innerHTML = `
                <div class="match-header">MATCH ${index + 1}</div>
                <div class="team-row">
                    <div class="team-info-wrapper"><img src="${LOGOS[m.t1] || 'default.png'}" class="mini-logo"><span class="team-name">${m.t1}</span></div>
                    <span class="score-box ${m.g1 > m.g2 ? 'winner-score' : ''}">${m.g1}</span>
                </div>
                <div class="team-row">
                    <div class="team-info-wrapper"><img src="${LOGOS[m.t2] || 'default.png'}" class="mini-logo"><span class="team-name">${m.t2}</span></div>
                    <span class="score-box ${m.g2 > m.g1 ? 'winner-score' : ''}">${m.g2}</span>
                </div>
            `;
            container.appendChild(card);
        });
    });
}

function renderTables(stats) {
    const arr = Object.values(stats);
    
    ['A', 'B'].forEach(grp => {
        const filtered = arr.filter(t => t.grp === grp)
                            .sort((a, b) => b.pts - a.pts || (b.gf - b.gs) - (a.gf - a.gs) || b.gf - a.gf);
        
        const body = document.getElementById(`body-${grp}`);
        body.innerHTML = filtered.map(t => `
            <tr>
                <td class="t-left"><img src="${LOGOS[t.name] || 'default.png'}" class="mini-logo" style="width:20px; height:20px; vertical-align:middle; margin-right:8px;"> ${t.name}</td>
                <td><strong>${t.pts}</strong></td>
                <td>${t.p}</td>
                <td>${t.gf}</td>
                <td>${t.gs}</td>
            </tr>
        `).join('');
    });

    // Speciali
    const allSortedAttacco = [...arr].sort((a,b) => b.gf - a.gf);
    document.getElementById('special-attacco').innerHTML = allSortedAttacco.slice(0,5).map(t => `<tr><td class="t-left">${t.name}</td><td><strong>${t.gf}</strong></td></tr>`).join('');
    
    const allSortedDifesa = [...arr].filter(t => t.p > 0).sort((a,b) => (a.gs/a.p) - (b.gs/b.p));
    document.getElementById('special-difesa').innerHTML = allSortedDifesa.slice(0,5).map(t => `<tr><td class="t-left">${t.name}</td><td><strong>${(t.gs/t.p).toFixed(1)}</strong> <small>media</small></td></tr>`).join('');
}

fetchData();
</script>

</body>
</html>
