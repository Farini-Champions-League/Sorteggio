<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabellone - Farini Champions League</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Montserrat', sans-serif; background-color: #000; color: white; overflow-x: hidden; }
        .ucl-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('sfondo.png') center/cover no-repeat; z-index: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 5, 20, 0.8); z-index: 2; }
        
        .content { position: relative; z-index: 10; padding: 40px 20px; text-align: center; }
        h1 { color: #d4af37; font-size: 35px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 50px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }

        /* Struttura Tabellone */
        .bracket { display: flex; justify-content: space-around; align-items: center; max-width: 1200px; margin: 0 auto; gap: 20px; }
        .round { display: flex; flex-direction: column; justify-content: space-around; gap: 40px; }
        
        .matchup { background: rgba(255, 255, 255, 0.1); border: 1px solid #0047e1; border-radius: 15px; width: 220px; padding: 10px; backdrop-filter: blur(5px); transition: 0.3s; }
        .matchup:hover { border-color: #d4af37; transform: scale(1.05); }

        .slot { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .slot:last-child { border-bottom: none; }
        .team-name { font-size: 14px; font-weight: 700; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score { background: #0047e1; color: white; padding: 2px 8px; border-radius: 4px; font-weight: 900; min-width: 20px; }
        .winner { color: #00ffa3; }

        .label { font-size: 12px; color: #00aaff; margin-bottom: 10px; font-weight: 900; letter-spacing: 2px; }
        
        .final-box { border: 3px solid #d4af37; background: rgba(212, 175, 55, 0.1); }
        .trophy-icon { width: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #d4af37); }

        /* Musica floating button */
        #music-btn { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: #d4af37; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; color: black; box-shadow: 0 0 15px rgba(212,175,55,0.5); }
    </style>
</head>
<body>

<div class="ucl-bg"></div>
<div class="overlay"></div>

<button id="music-btn" onclick="toggleMusic()">🔊 MUSICA</button>
<audio id="anthem" src="inno.mp3" loop></audio>

<div class="content">
    <h1>TABELLONE ELIMINAZIONE DIRETTA</h1>

    <div class="bracket">
        <div class="round">
            <div class="label">QUARTI</div>
            <div class="matchup">
                <div class="slot"><span class="team-name winner">B. Dortmund</span> <span class="score">7</span></div>
                <div class="slot"><span class="team-name">Aston Pinna</span> <span class="score">5</span></div>
            </div>
            <div class="matchup">
                <div class="slot"><span class="team-name winner">Attenti a quei due</span> <span class="score">7</span></div>
                <div class="slot"><span class="team-name">Armistizio FC</span> <span class="score">3</span></div>
            </div>
        </div>

        <div class="round">
            <div class="label">SEMIFINALE</div>
            <div class="matchup">
                <div class="slot"><span class="team-name">B. Dortmund</span> <span class="score">-</span></div>
                <div class="slot"><span class="team-name">TBD</span> <span class="score">-</span></div>
            </div>
            <div class="matchup">
                <div class="slot"><span class="team-name winner">Attenti a quei due</span> <span class="score">7</span></div>
                <div class="slot"><span class="team-name">Pennychellas</span> <span class="score">4</span></div>
            </div>
        </div>

        <div class="round">
            <img src="coppa.png" class="trophy-icon" style="align-self: center;">
            <div class="label">FINALISSIMA</div>
            <div class="matchup final-box">
                <div class="slot"><span class="team-name">VINCITORE SEMI 1</span> <span class="score">-</span></div>
                <div class="slot"><span class="team-name winner">Attenti a quei due</span> <span class="score">-</span></div>
            </div>
        </div>
    </div>

    <p style="margin-top: 50px; opacity: 0.5;">Dati aggiornati in base ai risultati correnti.</p>
</div>

<script>
    function toggleMusic() {
        const audio = document.getElementById('anthem');
        if (audio.paused) {
            audio.play();
            document.getElementById('music-btn').innerText = "⏸ PAUSA";
        } else {
            audio.pause();
            document.getElementById('music-btn').innerText = "🔊 MUSICA";
        }
    }
</script>

</body>
</html>
