<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabellone Ufficiale - Farini CL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; min-height: 100vh; font-family: 'Montserrat', sans-serif; background: #000; color: white; }
        .ucl-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('sfondo.png') center/cover no-repeat; z-index: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 2; }
        
        .main-container { position: relative; z-index: 10; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #d4af37; text-transform: uppercase; margin-bottom: 40px; text-shadow: 0 0 15px rgba(212,175,55,0.6); }

        /* Layout Tabellone */
        .bracket-wrapper { display: flex; align-items: center; justify-content: center; gap: 40px; width: 100%; max-width: 1400px; margin-top: 20px; }
        
        .side { display: flex; flex-direction: column; gap: 80px; }
        .center { display: flex; flex-direction: column; align-items: center; gap: 50px; }

        /* Box Partita */
        .match { background: #222; border-left: 5px solid #0047e1; width: 200px; padding: 0; border-radius: 4px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .team { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #333; }
        .team span:first-child { font-weight: 700; font-size: 13px; text-transform: uppercase; }
        .score { background: #0047e1; width: 30px; text-align: center; font-weight: 900; }
        .winner { background: #d4af37 !important; color: #000; }

        /* Finale */
        .finale-box { border: 3px solid #d4af37; transform: scale(1.2); background: rgba(212, 175, 55, 0.1); }
        .trophy { width: 100px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #d4af37); }
        
        #music-btn { position: fixed; bottom: 20px; left: 20px; background: #d4af37; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 100; }
        .back-btn { position: fixed; top: 20px; left: 20px; color: white; text-decoration: none; font-weight: bold; z-index: 100; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="ucl-bg"></div>
<div class="overlay"></div>

<a href="index.html" class="back-btn">← TORNA AI SORTEGGI</a>
<button id="music-btn" onclick="toggleMusic()">🔊 ATTIVA INNO</button>
<audio id="anthem" src="inno.mp3" loop></audio>

<div class="main-container">
    <h1>TABELLONE UFFICIALE FARINI CL</h1>

    <div class="bracket-wrapper">
        
        <div class="side">
            <div class="match">
                <div class="team"><span>B. Dortmund</span><span class="score winner">7</span></div>
                <div class="team"><span>Aston Pinna</span><span class="score">5</span></div>
            </div>
            <div class="match">
                <div class="team"><span>I Milanisti</span><span class="score">-</span></div>
                <div class="team"><span>B.I.B.C.</span><span class="score">-</span></div>
            </div>
        </div>

        <div class="center">
            <div class="match" style="margin-bottom: 100px;">
                <div class="team"><span>B. Dortmund</span><span class="score">-</span></div>
                <div class="team"><span>TBD</span><span class="score">-</span></div>
            </div>
            
            <div class="center">
                <img src="coppa.png" class="trophy">
                <div class="match finale-box">
                    <div class="team"><span>FINALISTA 1</span><span class="score">-</span></div>
                    <div class="team"><span>FINALISTA 2</span><span class="score">-</span></div>
                </div>
                <h2 style="color: #d4af37; font-size: 14px; letter-spacing: 3px;">FINALISSIMA</h2>
            </div>

            <div class="match" style="margin-top: 100px;">
                <div class="team"><span>Attenti a quei due</span><span class="score">-</span></div>
                <div class="team"><span>TBD</span><span class="score">-</span></div>
            </div>
        </div>

        <div class="side">
            <div class="match">
                <div class="team"><span>Attenti a quei due</span><span class="score winner">14</span></div>
                <div class="team"><span>Pennychellas</span><span class="score">10</span></div>
            </div>
            <div class="match">
                <div class="team"><span>Farini Fighter</span><span class="score">-</span></div>
                <div class="team"><span>FC Pelados</span><span class="score">-</span></div>
            </div>
        </div>

    </div>
</div>

<script>
    function toggleMusic() {
        const audio = document.getElementById('anthem');
        if (audio.paused) { audio.play(); document.getElementById('music-btn').innerText = "⏸ PAUSA"; }
        else { audio.pause(); document.getElementById('music-btn').innerText = "🔊 ATTIVA INNO"; }
    }
</script>

</body>
</html>
